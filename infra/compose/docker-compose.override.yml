version: "3.9"

# =============================================================================
# PLAground Platform — Docker Compose Dev Override
# =============================================================================
# This file is merged on top of docker-compose.yml by the docker:up / docker:down
# / docker:reset scripts (via -f flag).  It replaces the built-image commands
# with hot-reload dev commands so that source changes inside the bind-mounted
# directories are picked up without rebuilding the image.
#
# Only the four application services that need live-reload are listed here.
# Infrastructure services (postgres, pgbouncer, redis, minio, mailpit) run
# unchanged — no override needed for them.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API — Fastify server dev mode (tsx watch for hot reload)
  # ---------------------------------------------------------------------------
  api:
    command: node /app/node_modules/.pnpm/node_modules/tsx/dist/cli.mjs watch src/server.ts
    environment:
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
    working_dir: /app/apps/api

  # ---------------------------------------------------------------------------
  # Worker — BullMQ background processor dev mode
  # ---------------------------------------------------------------------------
  worker:
    command: node /app/node_modules/.pnpm/node_modules/tsx/dist/cli.mjs watch src/worker.ts
    working_dir: /app/apps/worker

  # ---------------------------------------------------------------------------
  # Web Storefront — Next.js dev server
  # ---------------------------------------------------------------------------
  web-storefront:
    command: >
      sh -lc "ln -sfn /app/node_modules /app/apps/web-storefront/node_modules &&
      node /app/node_modules/.pnpm/node_modules/next/dist/bin/next dev --port 3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    working_dir: /app/apps/web-storefront

  # ---------------------------------------------------------------------------
  # Web Admin — Next.js dev server
  # ---------------------------------------------------------------------------
  web-admin:
    command: >
      sh -lc "ln -sfn /app/node_modules /app/apps/web-admin/node_modules &&
      node /app/node_modules/.pnpm/node_modules/next/dist/bin/next dev --port 3001"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    working_dir: /app/apps/web-admin

  # ---------------------------------------------------------------------------
  # Connector — local container bridging cloud commands to BambuLab printers
  # Phase 2 scope: connector service definition lives here when Phase 2 begins.
  # The connector app directory (apps/connector/) is already scaffolded.
  # ---------------------------------------------------------------------------
  # connector:
  #   build:
  #     context: ../../
  #     dockerfile: infra/docker/connector.Dockerfile
  #     target: dev
  #   container_name: plaground-connector
  #   profiles: ["connector"]
  #   environment:
  #     NODE_ENV: development
  #   networks:
  #     - internal
